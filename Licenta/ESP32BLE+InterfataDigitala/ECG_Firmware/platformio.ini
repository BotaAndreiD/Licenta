[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_port = COM5
monitor_filters = direct
board_build.filesystem = littlefs
lib_deps = 
    h2zero/NimBLE-Arduino @ ^1.4.2
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1