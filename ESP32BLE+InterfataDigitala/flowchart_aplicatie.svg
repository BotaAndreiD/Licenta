<text x="360" y="586" text-anchor="middle" fill="#4C1D95" font-weight="600" font-size="11">Primire date ECG via BLE</text>
<line x1="360" y1="596" x2="360" y2="608" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#ap)"/>

<rect x="185" y="608" width="350" height="28" rx="5" fill="#EDE9FE" stroke="#5B21B6" stroke-width="1.5"/>
<text x="360" y="626" text-anchor="middle" fill="#4C1D95" font-weight="600" font-size="11">Afișare traseu ECG live</text>
<line x1="360" y1="636" x2="360" y2="648" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#ap)"/>

<rect x="185" y="648" width="350" height="28" rx="5" fill="#EDE9FE" stroke="#5B21B6" stroke-width="1.5"/>
<text x="360" y="666" text-anchor="middle" fill="#4C1D95" font-weight="600" font-size="11">Analiză PQRST + Calcul parametri</text>
<line x1="360" y1="676" x2="360" y2="688" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#ap)"/>

<rect x="185" y="688" width="350" height="28" rx="5" fill="#EDE9FE" stroke="#5B21B6" stroke-width="1.5"/>
<text x="360" y="706" text-anchor="middle" fill="#4C1D95" font-weight="600" font-size="11">Clasificare ritm + Calitate semnal</text>

<!-- Loop back arrow -->
<line x1="360" y1="716" x2="360" y2="734" stroke="#5B21B6" stroke-width="1.5"/>
<line x1="360" y1="734" x2="150" y2="734" stroke="#5B21B6" stroke-width="1.5"/>
<line x1="150" y1="734" x2="150" y2="582" stroke="#5B21B6" stroke-width="1.5"/>
<line x1="150" y1="582" x2="185" y2="582" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#ap)"/>

<!-- Exit arrow from loop bottom -->
<line x1="360" y1="742" x2="360" y2="758" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
<text x="375" y="753" fill="#374151" font-size="8.5" font-style="italic">Finalizare sesiune</text>

<!-- ═══ EXPORT ȘI ISTORIC ═══ -->
