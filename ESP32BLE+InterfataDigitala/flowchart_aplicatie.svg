<line x1="360" y1="60" x2="360" y2="74" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Diamond: Disponibil? cy=97 -->
<polygon points="360,74 468,97 360,120 252,97" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.5"/>
<text x="360" y="93" text-anchor="middle" fill="#1E3A8A" font-size="10">Dispozitiv și servicii</text>
<text x="360" y="106" text-anchor="middle" fill="#1E3A8A" font-size="10">disponibile?</text>

