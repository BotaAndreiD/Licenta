<line x1="714" y1="97" x2="714" y2="45" stroke="#B91C1C" stroke-width="1.5"/>
<line x1="714" y1="45" x2="510" y2="45" stroke="#B91C1C" stroke-width="1.5" marker-end="url(#ar)"/>

<line x1="360" y1="120" x2="360" y2="133" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
<text x="366" y="130" fill="#15803D" font-size="9">DA</text>

