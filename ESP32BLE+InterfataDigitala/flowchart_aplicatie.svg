<rect x="420" y="1008" width="236" height="26" rx="5" fill="#FEF3C7" stroke="#B45309" stroke-width="1.5"/>
<text x="538" y="1025" text-anchor="middle" fill="#78350F" font-size="10" font-weight="600">Calitate evaluată la fiecare 30 ms</text>

