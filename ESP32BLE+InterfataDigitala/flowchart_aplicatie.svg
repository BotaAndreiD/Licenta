<text x="226" y="364" text-anchor="middle" fill="#B91C1C" font-size="9">NU</text>
<rect x="18" y="356" width="170" height="28" rx="5" fill="#FEE2E2" stroke="#B91C1C" stroke-width="1.5"/>
<text x="103" y="374" text-anchor="middle" fill="#B91C1C" font-size="10" font-weight="600">Repoziționare electrozi</text>
<line x1="18" y1="370" x2="7" y2="370" stroke="#B91C1C" stroke-width="1.5"/>
<line x1="7" y1="370" x2="7" y2="320" stroke="#B91C1C" stroke-width="1.5"/>
