<rect x="64" y="1008" width="236" height="26" rx="5" fill="#FEE2E2" stroke="#B91C1C" stroke-width="1.5"/>
<text x="182" y="1025" text-anchor="middle" fill="#7F1D1D" font-size="10" font-weight="600">Recalibrare offset + Reluare sesiune</text>

<!-- RIGHT PANEL: Electrode Quality -->
