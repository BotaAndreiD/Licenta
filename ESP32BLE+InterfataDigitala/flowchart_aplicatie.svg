    <path d="M0,1 L9,5 L0,9z" fill="#374151"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,1 L9,5 L0,9z" fill="#B91C1C"/>
  </marker>
  <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,1 L9,5 L0,9z" fill="#5B21B6"/>
  </marker>
</defs>

<!-- ═══ FAZA 1: BLE ═══ -->
<rect x="0" y="0" width="720" height="24" fill="#1D4ED8" rx="3"/>
<text x="360" y="16" text-anchor="middle" fill="white" font-weight="bold" font-size="11.5">FAZA 1 — CONECTARE BLE (BleConnectionService)</text>

