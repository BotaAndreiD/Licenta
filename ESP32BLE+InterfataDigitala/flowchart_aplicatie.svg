<text x="360" y="526" text-anchor="middle" fill="#4C1D95" font-weight="600" font-size="11">Inițializare grafic + pornire timere</text>

<line x1="360" y1="537" x2="360" y2="550" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#ap)"/>

<!-- Dashed loop: y=550, h=192 -->
<rect x="142" y="550" width="436" height="192" rx="8" fill="#F5F3FF" stroke="#5B21B6" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="360" y="563" text-anchor="middle" fill="#5B21B6" font-size="9" font-style="italic">Buclă continuă — Timer Tick (30 ms)</text>

