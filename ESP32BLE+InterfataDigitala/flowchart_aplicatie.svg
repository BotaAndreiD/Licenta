<line x1="360" y1="464" x2="360" y2="477" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ═══ FAZA 4: MONITORIZARE ═══ -->
<rect x="0" y="477" width="720" height="24" fill="#5B21B6" rx="3"/>
<text x="360" y="493" text-anchor="middle" fill="white" font-weight="bold" font-size="11.5">FAZA 4 — MONITORIZARE LIVE (MainWindow)</text>

