<!-- ═══ FAZA 3: DATE PACIENT ═══ -->
<rect x="0" y="404" width="720" height="24" fill="#B45309" rx="3"/>
<text x="360" y="420" text-anchor="middle" fill="white" font-weight="bold" font-size="11.5">FAZA 3 — DATE PACIENT (PatientDialog)</text>

