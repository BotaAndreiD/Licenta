<rect x="496" y="788" width="210" height="30" rx="6" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
<text x="601" y="807" text-anchor="middle" fill="#134E4A" font-weight="600" font-size="11">Fereastra de Istoric</text>

<!-- ═══ MONITORIZARE CONTINUĂ ÎN FUNDAL ═══ -->
<rect x="0" y="830" width="720" height="24" fill="#1C1917" rx="3"/>
<text x="360" y="846" text-anchor="middle" fill="white" font-weight="bold" font-size="11">MONITORIZARE CONTINUĂ ÎN FUNDAL</text>

<!-- LEFT PANEL: BLE Reconnect -->
<rect x="8" y="860" width="348" height="22" rx="4" fill="#7F1D1D"/>
<text x="182" y="875" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Monitorizare Conexiune BLE</text>

